name: Nightly Security Check

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-security-check
  cancel-in-progress: true

jobs:
  nightly-security-check:
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: nyffels/github-runner:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest published images
        shell: bash
        run: |
          set -euo pipefail
          docker pull --platform linux/amd64 "$IMAGE_REF"
          docker pull --platform linux/arm64 "$IMAGE_REF"

      - name: Scan image with Trivy (linux/amd64)
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: LOW,MEDIUM,HIGH,CRITICAL
          format: json
          output: trivy-nightly-linux-amd64.json
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Scan image with Trivy (linux/arm64)
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: LOW,MEDIUM,HIGH,CRITICAL
          format: json
          output: trivy-nightly-linux-arm64.json
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Install Docker Scout
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh
          docker scout version

      - name: Scan image with Docker Scout
        shell: bash
        run: |
          set -euo pipefail
          docker scout cves "$IMAGE_REF" --platform linux/amd64 --format sarif > scout-nightly-linux-amd64.sarif || true
          docker scout cves "$IMAGE_REF" --platform linux/arm64 --format sarif > scout-nightly-linux-arm64.sarif || true

      - name: Generate nightly report
        id: report
        shell: bash
        run: |
          set -euo pipefail

          trivy_files=(trivy-nightly-linux-amd64.json trivy-nightly-linux-arm64.json)
          scout_files=(scout-nightly-linux-amd64.sarif scout-nightly-linux-arm64.sarif)

          TOTAL_COUNT="$(jq -s '[.[].Results[]?.Vulnerabilities[]?] | length' "${trivy_files[@]}")"
          HIGH_CRIT_COUNT="$(jq -s '[.[].Results[]?.Vulnerabilities[]? | select((.Severity // "") == "HIGH" or (.Severity // "") == "CRITICAL")] | length' "${trivy_files[@]}")"
          FIXABLE_COUNT="$(jq -s '[.[].Results[]?.Vulnerabilities[]? | select((.FixedVersion // "") != "" and ((.FixedVersion // "") | ascii_downcase) != "not fixed")] | length' "${trivy_files[@]}")"
          SCOUT_TOTAL_COUNT="$(jq -s '[.[].runs[]?.results[]?] | length' "${scout_files[@]}")"
          ACTIONABLE_COUNT="$((FIXABLE_COUNT + HIGH_CRIT_COUNT + SCOUT_TOTAL_COUNT))"

          {
            echo "<!-- nightly-security-report -->"
            echo "# Nightly Security Report"
            echo ""
            echo "- Generated (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
            echo "- Platforms scanned: linux/amd64, linux/arm64"
            echo ""
            echo "## Trivy overview"
            echo "- Total findings: ${TOTAL_COUNT}"
            echo "- High/Critical findings: ${HIGH_CRIT_COUNT}"
            echo "- Findings with a known fix: ${FIXABLE_COUNT}"
            echo ""
            echo "## Docker Scout overview"
            echo "- Total findings: ${SCOUT_TOTAL_COUNT}"
            echo ""
            echo "## Possible fixes (from Trivy fixed versions)"
            echo ""
            if [[ "$FIXABLE_COUNT" -gt 0 ]]; then
              echo "| CVE | Severity | Package | Installed | Fixed |"
              echo "|---|---|---|---|---|"
              jq -r '
                .Results[]?.Vulnerabilities[]?
                | select((.FixedVersion // "") != "" and ((.FixedVersion // "") | ascii_downcase) != "not fixed")
                | [(.VulnerabilityID // "n/a"), (.Severity // "n/a"), (.PkgName // "n/a"), (.InstalledVersion // "n/a"), (.FixedVersion // "n/a")]
                | @tsv
              ' "${trivy_files[@]}" \
              | sort -u \
              | while IFS=$'\t' read -r cve severity pkg installed fixed; do
                  printf '| %s | %s | %s | %s | %s |\n' "$cve" "$severity" "$pkg" "$installed" "$fixed"
                done
            else
              echo "No fixable vulnerabilities reported by Trivy in this run."
            fi
            echo ""
            echo "## Non-fixable right now"
            echo ""
            echo "Findings without a fixed package version are usually pending upstream distro/vendor patches."
            echo ""
            echo "## Docker Scout findings"
            echo ""
            if [[ "$SCOUT_TOTAL_COUNT" -gt 0 ]]; then
              echo "| CVE | Summary |"
              echo "|---|---|"
              jq -r '
                .runs[].results[]?
                | [(.ruleId // "n/a"), ((.message.text // "n/a") | gsub("[\r\n]+"; " ") | gsub("[|]"; "/"))]
                | @tsv
              ' "${scout_files[@]}" \
              | sort -u \
              | while IFS=$'\t' read -r cve summary; do
                  printf '| %s | %s |\n' "$cve" "$summary"
                done
            else
              echo "No Docker Scout findings in this run."
            fi
          } > nightly-report.md

          {
            echo "total_count=${TOTAL_COUNT}"
            echo "high_crit_count=${HIGH_CRIT_COUNT}"
            echo "fixable_count=${FIXABLE_COUNT}"
            echo "scout_total_count=${SCOUT_TOTAL_COUNT}"
            echo "actionable_count=${ACTIONABLE_COUNT}"
          } >> "$GITHUB_OUTPUT"

          cat nightly-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-security-report
          path: |
            trivy-nightly-*.json
            scout-nightly-*.sarif
            nightly-report.md

      - name: Create or update GitHub issue
        if: ${{ steps.report.outputs.actionable_count != '0' }}
        uses: actions/github-script@v7
        env:
          REPORT_PATH: nightly-report.md
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Nightly Security Report (Automated)';
            const titlePrefix = 'Nightly Security Report';
            const body = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const assignee = context.actor;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const nightlyIssues = issues.filter(i => i.title.startsWith(titlePrefix));
            const existing = nightlyIssues.find(i => i.title === title);
            let keptIssueNumber;

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
                assignees: [assignee]
              });
              keptIssueNumber = existing.number;
              core.info(`Updated issue #${existing.number} and assigned to ${assignee}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                assignees: [assignee]
              });
              keptIssueNumber = created.data.number;
              core.info(`Created issue #${created.data.number} and assigned to ${assignee}`);
            }

            const staleIssues = nightlyIssues.filter(i => i.number !== keptIssueNumber);
            for (const issue of staleIssues) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Superseded by #${keptIssueNumber}. Closing older nightly report automatically.`
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed'
              });

              core.info(`Closed older nightly issue #${issue.number}`);
            }

      - name: Close nightly issue when no actionable findings
        if: ${{ steps.report.outputs.actionable_count == '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const titlePrefix = 'Nightly Security Report';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const nightlyIssues = issues.filter(i => i.title.startsWith(titlePrefix));
            if (nightlyIssues.length === 0) {
              core.info('No open nightly issues to close.');
              return;
            }

            for (const issue of nightlyIssues) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: 'Nightly run found no actionable items across linux/amd64 and linux/arm64. Closing this issue automatically.'
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed'
              });

              core.info(`Closed issue #${issue.number}`);
            }
