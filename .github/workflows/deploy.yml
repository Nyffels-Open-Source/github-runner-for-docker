name: Release to Docker

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: nyffels/github-runner
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.VERSION }}
    steps:
      - name: Set CalVer version
        uses: Nyffels-IT/github-actions-calver-version-generator@v1.0.1

      - name: Show version
        run: 'echo "Version: ${{ env.VERSION }}"'

  get_runner_version:
    runs-on: ubuntu-latest
    outputs:
      runner_version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Fetch latest GitHub Actions runner version
        id: extract
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          auth_args=()
          if [[ -n "${GITHUB_TOKEN:-}" ]]; then
            auth_args=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
          fi

          version="$(
            curl -fsSL "${auth_args[@]}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/actions/runner/releases/latest \
              | jq -r '.tag_name | sub("^v"; "")'
          )"

          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "Could not determine latest runner version"
            exit 1
          fi

          echo "Latest runner version: $version"
          {
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: [get_version, get_runner_version]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: true
          platforms: ${{ env.PLATFORMS }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RUNNER_VERSION=${{ needs.get_runner_version.outputs.runner_version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.get_version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

  scan-trivy:
    name: "Security: Trivy (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [deploy, get_version]
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    env:
      IMAGE_REF: nyffels/github-runner:${{ needs.get_version.outputs.version }}
      TRIVY_PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore

  scan-trivy-non-blocking:
    name: "Security: Trivy non-blocking (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [deploy, get_version]
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    env:
      IMAGE_REF: nyffels/github-runner:${{ needs.get_version.outputs.version }}
      TRIVY_PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          severity: LOW,MEDIUM
          exit-code: "1"
          trivyignores: .trivyignore

  scan-scout:
    name: "Security: Docker Scout (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [deploy, get_version]
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    env:
      IMAGE_REF: nyffels/github-runner:${{ needs.get_version.outputs.version }}
      PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install Docker Scout
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh
          docker scout version

      - name: Scan image
        shell: bash
        run: |
          set -euo pipefail

          docker scout cves "$IMAGE_REF" \
            --platform "$PLATFORM" \
            --only-severity critical,high \
            --format sarif > scout.sarif || true

          blocking_count="$(jq '[.runs[].results[]?] | length' scout.sarif)"
          if [[ "$blocking_count" -gt 0 ]]; then
            echo "Blocking critical/high CVEs found for ${PLATFORM}:"
            jq -r '.runs[].results[]? | .ruleId' scout.sarif | sort -u
            exit 1
          fi

          echo "No blocking critical/high CVEs for ${PLATFORM}."

  scan-scout-non-blocking:
    name: "Security: Docker Scout non-blocking (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [deploy, get_version]
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    env:
      IMAGE_REF: nyffels/github-runner:${{ needs.get_version.outputs.version }}
      PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install Docker Scout
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh
          docker scout version

      - name: Scan image
        shell: bash
        run: |
          set -euo pipefail

          docker scout cves "$IMAGE_REF" \
            --platform "$PLATFORM" \
            --only-severity medium,low \
            --format sarif > scout-nonblocking.sarif || true

          finding_count="$(jq '[.runs[].results[]?] | length' scout-nonblocking.sarif)"
          echo "Docker Scout non-blocking findings for ${PLATFORM}: ${finding_count}"

          if [[ "$finding_count" -gt 0 ]]; then
            echo "| CVE | Summary |"
            echo "|---|---|"
            jq -r '
              .runs[].results[]?
              | [(.ruleId // "n/a"), ((.message.text // "n/a") | gsub("[\r\n]+"; " ") | gsub("[|]"; "/"))]
              | @tsv
            ' scout-nonblocking.sarif \
              | sort -u \
              | while IFS=$'\t' read -r cve summary; do
                  printf '| %s | %s |\n' "$cve" "$summary"
                done
            exit 1
          fi
